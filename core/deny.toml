[advisories]
db-path = "~/.cargo/advisory-db"
unmaintained = "workspace"
yanked = "deny"

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "MPL-2.0",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "Zlib",
  "CC0-1.0",
  "Unlicense",
  "0BSD",
  "CDLA-Permissive-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "AGPL-3.0-or-later",
]

[bans]
multiple-versions = "warn"
